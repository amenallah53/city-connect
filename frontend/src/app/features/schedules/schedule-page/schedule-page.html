<div class="schedule-page">

  <button class="back-btn" (click)="goBack()">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
    </svg>
    Retour
  </button>

  <div class="page-header">
    <h1 class="title font-rubik">Horaires & Plannings</h1>
    <p class="subtitle">Consultez les horaires hebdomadaires de tous les services municipaux.</p>
  </div>

  <div class="filters-row">
    <button
      *ngFor="let f of filters"
      (click)="setFilter(f)"
      class="filter-btn"
      [class.active]="activeFilter === f">
      {{ f }}
    </button>
  </div>

  <div class="cards-grid">
    <div *ngFor="let h of filtered" class="schedule-card">

      <div class="card-top">
        <h3 class="card-title">{{ h.nom }}</h3>
        <span class="type-badge" [ngClass]="'badge-' + h.type.toLowerCase().split(' ').join('-')">
          {{ h.type }}
        </span>
      </div>

      <div class="days-row">
        <span
          *ngFor="let day of days"
          class="day-pill"
          [class.active]="hasDay(h, day)">
          {{ day.slice(0, 3) }}
        </span>
      </div>

      <div class="date-range">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        {{ h.date_deb | date:'dd/MM/yyyy' }} — {{ h.date_fin | date:'dd/MM/yyyy' }}
      </div>

    </div>
  </div>

  <div *ngIf="filtered.length === 0" class="empty-state">
    Aucun horaire trouvé pour ce filtre.
  </div>

</div>
