<div class="p-6">
    <div class="flex flex-col gap-3">
        <div class="flex flex-row items-center justify-between">
            <div class="flex flex-row items-center gap-3">
                <div 
                    class="rounded-full h-[60px] w-[60px] 
                    border border-[#F0F0F0]">
                    <img class=" rounded-full h-full w-full" src="/assets/avatar.png" alt="avatar">
                </div>
                <div class="flex flex-col items-start">
                    <h3 class="text-[20px] font-semibold text-[var(--primary-text-color)]">
                        {{job.name}} {{job.surname}}
                    </h3>
                    <h3 class="text-[18px] font-medium text-[var(--secondary-text-color)]">
                        {{job.profession}}
                    </h3>
                </div>
            </div>
            <div class="flex flex-row items-center gap-2">
                <div 
                    class="text-center bg-[var(--primary-color)] text-[var(--secondary-color)] 
                    rounded-[12px] px-2 py-[6px] text-[16px] font-medium w-fit">
                    {{job.reach}}
                </div>
                <div class="flex flex-row items-center gap-1">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        width="20" height="20" viewBox="0 0 24 24" fill="yes" 
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                        class="text-[#F8BD1C] fill-[#F8BD1C] lucide lucide-star-icon lucide-star">
                        <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/>
                    </svg>
                    <h3 class="text-[18px] font-medium text-[var(--primary-subtitle-color)]">
                        {{job.rating}}
                    </h3>
                </div>
            </div>
        </div>
        
        <p class="py-2 text-[var(--secondary-text-color)]">{{job.description}}</p>

        <div class="flex flex-row items-center gap-2">
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" height="24" viewBox="0 0 24 24" fill="none" 
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                class="text-[var(--primary-text-color)] lucide lucide-phone-icon lucide-phone">
                <path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/>
            </svg>
            <h3 class="text-[18px] font-medium text-[var(--primary-text-color)]">
                {{job.phone}}
            </h3>
        </div>
        <div class="flex flex-row items-center gap-2">
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" height="24" viewBox="0 0 24 24" fill="none" 
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                class="var(--primary-text-color) lucide lucide-mail-icon lucide-mail">
                <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/>
            </svg>
            <h3 class="text-[18px] font-medium text-[var(--primary-text-color)]">
                {{job.email}}
            </h3>
        </div>
    </div>
    <!-- DATE PICKER -->
    <div class="mt-8">
        <label class="block mb-2 font-semibold">Offer Date Suggestion</label>

        <p-datepicker
        [(ngModel)]="selectedDate"
        [showTime]="true"
        hourFormat="24"
        inputStyleClass="w-full">
        </p-datepicker>
    </div>

    <!-- CTA -->
    <div class="mt-6">
        <button 
        (click)="sendRequest()"
        [disabled]="!selectedDate"
        class="flex items-center justify-center gap-2 py-2 px-4 rounded-[24px] w-full transition
        bg-[var(--primary-color)] text-white
        disabled:bg-gray-300 disabled:cursor-not-allowed
        hover:bg-[#005E71]">

        Request an offer

        <svg width="20" height="20" fill="none" stroke="currentColor">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
        </svg>
        </button>
    </div>
</div>
