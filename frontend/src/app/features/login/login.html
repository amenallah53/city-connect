<div id="body">
  <script async src="https://accounts.google.com/gsi/client"></script>
  <app-login-projet-descrip></app-login-projet-descrip>
  <div class="card">
    <div id="div1">Sign in</div>
    <div id="div2">Use your email to sign in or continue with Google</div>
    <button id="button1">
      <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/>
      </svg>
      Continue with Google
    </button>
    <div id="parent1">
      <hr>
      <div>or sign in with your email</div>
      <hr>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div id="div3">Email</div>
      <input formControlName="email" type="text" placeholder="you@example.com">

      <div id="parent2">
        <div id="pass">Password</div>
        <div id="for"><a routerLink="/login/reset">Forgot ?</a></div>
      </div>
      <input formControlName="password" type="password" placeholder="Enter your password">
      <div>
        <button id="button2" type="submit">Sign in</button>
      </div>
    </form>

    <div id="parent3">
      <div>Don't have an account?</div>
      <div id="pdiv2"><a routerLink="/login/create-account">Create one</a></div>
    </div>
    <div id="div4">By signing in you agree to our Terms and Privacy policy.</div>
  </div>
  

</div>
