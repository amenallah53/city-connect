<div class="profile-page">
  <div class="header-section">
    <div class="titles">
      <h1 class="title">My Profile</h1>
      <p class="subtitle">Manage your personal information and account settings</p>
    </div>
  </div>

  <div class="content-container" *ngIf="!isLoading; else loading">
    <!-- Status Message -->
    <div *ngIf="statusMessage" 
         [class]="'status-alert ' + (statusMessage.type === 'success' ? 'success' : 'error')">
      <span>{{ statusMessage.text }}</span>
    </div>

    <div class="form-card">
      <div class="avatar-section">
        <div class="avatar-circle">
          {{ getInitials() }}
        </div>
        <div class="user-info">
          <h3>{{ userProfile?.firstName }} {{ userProfile?.lastName }}</h3>
          <p>Citizen Account</p>
        </div>
      </div>

      <div class="divider"></div>

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <!-- First Name -->
          <div class="form-group">
            <label>First Name</label>
            <input type="text" formControlName="firstName" [readonly]="!isEditing" 
                   [class.editable]="isEditing" placeholder="Your first name">
          </div>

          <!-- Last Name -->
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" formControlName="lastName" [readonly]="!isEditing"
                   [class.editable]="isEditing" placeholder="Your last name">
          </div>

          <!-- Email -->
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" formControlName="email" [readonly]="!isEditing"
                   [class.editable]="isEditing" placeholder="Email address">
          </div>

          <!-- CIN (Always Read Only) -->
          <div class="form-group">
            <label>CIN (National ID)</label>
            <input type="text" [value]="userProfile?.cin" readonly class="readonly-field">
          </div>

          <!-- Password Fields (Only in edit mode) -->
          <ng-container *ngIf="isEditing">
            <div class="form-group">
              <label>New Password</label>
              <input type="password" formControlName="newPassword" placeholder="Minimum 6 characters">
            </div>

            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" formControlName="confirmPassword" placeholder="Confirm new password">
              <span class="error-msg" *ngIf="profileForm.errors?.['mismatch']">Passwords do not match</span>
            </div>
          </ng-container>

          <!-- Password Placeholder (View Mode) -->
          <div class="form-group" *ngIf="!isEditing">
            <label>Password</label>
            <input type="password" value="********" readonly class="password-stub">
          </div>
        </div>

        <div class="form-actions">
          <button type="button" *ngIf="!isEditing" (click)="toggleEdit()" class="btn-secondary">
            Edit Details
          </button>

          <ng-container *ngIf="isEditing">
            <button type="button" (click)="toggleEdit()" class="btn-ghost" [disabled]="isLoading">
              Cancel
            </button>
            <button type="submit" class="submit-btn" [disabled]="profileForm.invalid || isLoading">
              {{ isLoading ? 'Saving...' : 'Save Changes' }}
            </button>
          </ng-container>
        </div>
      </form>
    </div>
  </div>

  <ng-template #loading>
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading your profile details...</p>
    </div>
  </ng-template>
</div>
