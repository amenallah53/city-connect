<div class="flex flex-row items-center justify-between pr-6">
  <div class="vertical-div titles">
    <p class="title">Report tickets</p>
    <p class="subtitle">Check your tickets and follow their progress here!</p>
  </div>
  <a routerLink="/complaints/new">
    <button
      class="border border-[var(--primary-color)] text-[16px] font-medium
      py-2 px-4 rounded-[12px] shadow-[0px_2px_15px_0px_rgba(0,0,0,0.1)]
      bg-[var(--primary-color)] text-[var(--secondary-color)]
      hover:bg-[var(--secondary-color)] hover:text-[var(--primary-color)]
      hover:cursor-pointer transition-colors duration-300">
      Make a Complaint!
    </button>
  </a>
</div>

<!-- Cards -->
<div class="px-6 py-4 flex justify-center">
  <div class="grid grid-cols-4 gap-6" style="width: fit-content;">
    <app-report-card
      *ngFor="let report of pagedReports"
      [status]="report.status">
    </app-report-card>
  </div>
</div>

<!-- Empty state -->
<div
  *ngIf="allReports.length === 0"
  class="flex flex-col items-center justify-center py-20 gap-4">
  <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    class="text-[var(--secondary-text-color)]">
    <path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/>
  </svg>
  <p class="text-[18px] text-[var(--primary-subtitle-color)] font-medium">
    No complaints found.
  </p>
</div>

<!-- Paginator -->
<div class="flex justify-center py-6" *ngIf="allReports.length > 0">
  <p-paginator
    (onPageChange)="onPageChange($event)"
    [first]="first"
    [rows]="rows"
    [totalRecords]="allReports.length"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
  />
</div>
