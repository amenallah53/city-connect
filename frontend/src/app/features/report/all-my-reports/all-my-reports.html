<div class="vertical-div titles">
    <p class="title">Report tickets</p>
    <p class="subtitle">Check your tickets and follow their progress here!</p>
</div>

<div class="report-cards-container horizontal-div">
    <div *ngIf="loading" class="loading-state">Loading your reports...</div>
    <div *ngIf="!loading && tickets.length === 0" class="empty-state">No reports found.</div>
    <app-report-card 
        *ngFor="let t of tickets" 
        [ticket]="t"
    ></app-report-card>
</div>

<div class="horizontal-div page-selector">
    <div class="current-page-number">
        <p>1</p>
    </div>
    <div class="page-number">
        <p>2</p>
    </div>

    <div class="page-number">
        <p>3</p>
    </div>

    <div class="three-dots">
        <p>...</p>
    </div>
    
    <div class="page-number">
        <p>5</p>
    </div>
    
    <div class="page-number">
        <p>6</p>
    </div>
</div>
