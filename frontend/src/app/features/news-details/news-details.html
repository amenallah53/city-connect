<div *ngIf="isLoading" class="min-h-screen bg-gray-50 flex items-center justify-center">
  <p class="text-[18px] text-[var(--secondary-text-color)]">Loading news details...</p>
</div>

<div *ngIf="!isLoading && errorMessage" class="min-h-screen bg-gray-50 flex flex-col items-center justify-center gap-4 px-4">
  <p class="text-[18px] text-[var(--secondary-text-color)] text-center">{{ errorMessage }}</p>
  <button
    (click)="goBackHome()"
    class="border border-[var(--primary-color)] text-[16px] font-medium py-2 px-4 rounded-[12px]
      bg-[var(--primary-color)] text-[var(--secondary-color)] hover:bg-[var(--secondary-color)]
      hover:text-[var(--primary-color)] hover:cursor-pointer transition-colors duration-300">
    Back To Home
  </button>
</div>

<div *ngIf="!isLoading && !errorMessage && news as n" class="min-h-screen bg-gray-50">

  <!-- HERO -->
  <app-hero-section
    [heroTitle]="n.heroTitle"
    [heroSubtitle]="n.heroSubtitle"
    [heroImg]="n.heroImg">
  </app-hero-section>


  <!-- CONTENT -->
  <div class="max-w-4xl mx-auto px-4 py-10">

    <!-- Meta -->
    <div class="flex flex-row justify-between items-center gap-4 text-[18px] text-[var(--secondary-text-color)] mb-6">
        <div class="flex flex-row gap-1 items-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-icon lucide-calendar"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
            <span class="text-[18px] text-[var(--secondary-text-color)]">{{ n.date | date:'mediumDate' }}</span>
        </div>
        <span *ngIf="n.author">By {{ n.author }}</span>
    </div>

    <!-- Badges -->
    <div class="flex flex-wrap gap-2 mb-6">
        <div 
            *ngFor="let badge of n.badges"
            class="px-3 py-[6px] text-center text-[16px] font-medium
                bg-[var(--background-color)] text-[var(--secondary-text-color)]
                rounded-[25px] w-fit">
            {{ badge }}
        </div>
    </div>

    <!-- Articles -->
    <div *ngIf="n.subArticles.length > 0; else noArticles" class="space-y-10">
      <div *ngFor="let article of n.subArticles">

        <h2 class="text-2xl font-bold mb-3 text-gray-800">
          {{ article.title }}
        </h2>

        <p class="text-gray-600 leading-relaxed mb-4">
          {{ article.content }}
        </p>

        <!-- Media -->
        <img 
          *ngIf="article.mediaUrl && article.mediaType === 'image'"
          [src]="article.mediaUrl"
          class="w-full rounded-xl shadow-md"
        />

        <video
          *ngIf="article.mediaUrl && article.mediaType === 'video'"
          [src]="article.mediaUrl"
          controls
          class="w-full rounded-xl shadow-md">
        </video>

      </div>
    </div>

    <ng-template #noArticles>
      <p class="text-gray-600 leading-relaxed">No article content is available yet for this news item.</p>
    </ng-template>

  </div>
</div>
