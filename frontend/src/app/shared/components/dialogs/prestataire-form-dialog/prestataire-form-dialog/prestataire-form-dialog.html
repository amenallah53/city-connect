<div class="flex flex-col gap-1 pb-2">
  <p class="text-[14px] italic text-[var(--secondary-text-color)]">
    Fill in the details below to create a new prestataire.
  </p>
</div>

<div class="flex flex-col gap-6 pt-2">

  <!-- ── Section: Main Information ── -->
  <div class="border border-[var(--primary-color)] rounded-[16px] p-5 flex flex-col gap-4">
    <h3 class="text-[15px] font-semibold text-[var(--primary-text-color)]">
      Prestataire main Information
    </h3>

    <!-- First Name / Last Name -->
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-[13px] font-medium text-[var(--primary-text-color)]">First Name</label>
        <input
          pInputText
          [(ngModel)]="firstName"
          disabled
          placeholder="First Name"
          class="w-full rounded-[10px] border border-[var(--border-color)]
                 px-3 py-2 text-[14px] bg-[var(--background-color)]
                 text-[var(--secondary-text-color)] cursor-not-allowed" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[13px] font-medium text-[var(--primary-text-color)]">Last Name</label>
        <input
          pInputText
          [(ngModel)]="lastName"
          disabled
          placeholder="Last Name"
          class="w-full rounded-[10px] border border-[var(--border-color)]
                 px-3 py-2 text-[14px] bg-[var(--background-color)]
                 text-[var(--secondary-text-color)] cursor-not-allowed" />
      </div>
    </div>

    <!-- Email -->
    <div class="flex flex-col gap-1">
      <label class="text-[13px] font-medium text-[var(--primary-text-color)]">Email</label>
      <input
        pInputText
        [(ngModel)]="email"
        disabled
        placeholder="Email"
        class="w-full rounded-[10px] border border-[var(--border-color)]
               px-3 py-2 text-[14px] bg-[var(--background-color)]
               text-[var(--secondary-text-color)] cursor-not-allowed" />
    </div>

    <!-- CIN / Phone -->
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-[13px] font-medium text-[var(--primary-text-color)]">CIN</label>
        <input
          pInputText
          [ngModel]="cin"
          disabled
          placeholder="CIN"
          class="w-full rounded-[10px] border border-[var(--border-color)]
                 px-3 py-2 text-[14px] bg-[var(--background-color)]
                 text-[var(--secondary-text-color)] cursor-not-allowed" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[13px] font-medium text-[var(--primary-text-color)]">Phone Number</label>
        <input
          pInputText
          [(ngModel)]="telephone"
          disabled
          placeholder="Phone Number"
          class="w-full rounded-[10px] border border-[var(--border-color)]
                 px-3 py-2 text-[14px] bg-[var(--background-color)]
                 text-[var(--secondary-text-color)] cursor-not-allowed" />
      </div>
    </div>

    <!-- Address -->
    <div class="flex flex-col gap-1">
      <label class="text-[13px] font-medium text-[var(--primary-text-color)]">Address</label>
      <input
        pInputText
        [(ngModel)]="addresse"
        disabled
        placeholder="Address"
        class="w-full rounded-[10px] border border-[var(--border-color)]
               px-3 py-2 text-[14px] bg-[var(--background-color)]
               text-[var(--secondary-text-color)] cursor-not-allowed" />
    </div>
  </div>

  <!-- ── Section: Prestataire Details ── -->
  <div class="border border-dashed border-[var(--primary-color)] rounded-[16px] p-5 flex flex-col gap-4">
    <h3 class="text-[15px] font-semibold text-[var(--primary-text-color)]">
      Prestataire Details
    </h3>

    <!-- Specialty -->
    <div class="flex flex-col gap-1">
      <label class="text-[13px] font-medium text-[var(--primary-text-color)]">Specialty</label>
      <input
        pInputText
        [(ngModel)]="specialty"
        placeholder="e.g. Electrician, Plumber..."
        class="w-full rounded-[10px] border border-[var(--border-color)]
               px-3 py-2 text-[14px]" />
    </div>

    <!-- Reach -->
    <div class="flex flex-col gap-1">
      <label class="text-[13px] font-medium text-[var(--primary-text-color)]">Reach</label>
      <p-select
        [options]="reachOptions"
        [(ngModel)]="selectedReach"
        optionLabel="name"
        placeholder="Select reach"
        class="w-full" />
    </div>

    <!-- Description -->
    <div class="flex flex-col gap-1">
      <label class="text-[13px] font-medium text-[var(--primary-text-color)]">Description</label>
      <textarea
        pTextarea
        [(ngModel)]="description"
        rows="4"
        placeholder="Briefly describe your services and experience..."
        class="w-full rounded-[10px] border border-[var(--border-color)]
               px-3 py-2 text-[14px] resize-none">
      </textarea>
    </div>

    <!-- Social Links -->
    <div class="flex flex-col gap-1">
      <label class="text-[13px] font-medium text-[var(--primary-text-color)]">
        Social Links
        <span class="text-[var(--primary-subtitle-color)] font-normal">(comma-separated)</span>
      </label>
      <input
        pInputText
        [(ngModel)]="socialLinksRaw"
        placeholder="https://facebook.com/you, https://linkedin.com/in/you"
        class="w-full rounded-[10px] border border-[var(--border-color)]
               px-3 py-2 text-[14px]" />
    </div>

    <!-- Extra Document -->
    <div class="flex flex-col gap-1">
      <label class="text-[13px] font-medium text-[var(--primary-text-color)]">
        Extra Document
        <span class="text-[var(--primary-subtitle-color)] font-normal">(optional)</span>
      </label>
      <div class="flex flex-row items-center gap-4 p-3 rounded-[12px]
                  border border-[var(--border-color)] bg-[var(--background-color)]">
        <!-- Preview placeholder -->
        <div class="w-[56px] h-[56px] rounded-[10px] bg-[var(--border-color)]
                    flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" class="text-[var(--primary-subtitle-color)]">
            <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
            <circle cx="9" cy="9" r="2"/>
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
          </svg>
        </div>
        <div class="flex flex-col gap-2 flex-1">
          <p class="text-[13px] text-[var(--secondary-text-color)] italic">
            Please upload a document where you can strengthen your request
          </p>
          <div class="flex flex-row items-center gap-3">
            <label
              class="border border-[var(--primary-color)] text-[13px] font-medium
                     py-1.5 px-4 rounded-[10px] bg-[var(--secondary-color)]
                     text-[var(--primary-color)] hover:bg-[var(--primary-color)]
                     hover:text-[var(--secondary-color)] hover:cursor-pointer
                     transition-colors duration-300">
              Choose File
              <input type="file" class="hidden" (change)="onFileChange($event)" />
            </label>
            <span class="text-[13px] text-[var(--primary-subtitle-color)]">
              {{ extraDocumentFile ? extraDocumentFile.name : 'No file chosen' }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Actions ── -->
  <div class="flex flex-row justify-end gap-3 pt-2 pb-1">
    <button
      (click)="onCancel()"
      class="border border-[var(--border-color)] text-[14px] font-medium
             py-2 px-6 rounded-[12px] bg-[var(--secondary-color)]
             text-[var(--secondary-text-color)] hover:bg-[var(--background-color)]
             hover:cursor-pointer transition-colors duration-300">
      Cancel
    </button>
    <button
      (click)="onSubmit()"
      class="border border-[var(--primary-color)] text-[14px] font-medium
             py-2 px-6 rounded-[12px] bg-[var(--primary-color)]
             text-[var(--secondary-color)] hover:bg-[var(--secondary-color)]
             hover:text-[var(--primary-color)] hover:cursor-pointer
             transition-colors duration-300">
      Save prestataire
    </button>
  </div>

</div>
