<div 
    class="p-6 bg-[var(--card-color)] border border-[var(--border-color)] 
    rounded-[24px] flex flex-col gap-4 w-[300px]
    shadow-[0px_2px_15px_0px_rgba(0,0,0,0.1)]"
>
    <div class="flex flex-col gap-3">
        <div class="flex flex-row items-center gap-2 justify-start">
            <!-- Icon placeholder -->
            <p-skeleton shape="circle" size="50px" styleClass="shrink-0"></p-skeleton>
            <!-- Title placeholder -->
            <p-skeleton width="60%" height="1.5rem"></p-skeleton>
        </div>
        
        <!-- Type placeholder -->
        <p-skeleton width="40%" height="1.2rem" styleClass="mt-1"></p-skeleton>
        
        <!-- Badges placeholders -->
        <div class="flex flex-wrap gap-2">
            <p-skeleton width="80px" height="30px" borderRadius="15px"></p-skeleton>
            <p-skeleton width="100px" height="30px" borderRadius="15px"></p-skeleton>
        </div>
    </div>

    <!-- Button placeholder -->
    <p-skeleton width="100%" height="40px" borderRadius="24px" styleClass="mt-2"></p-skeleton>
</div>
