<div
  class="p-6 bg-[var(--card-color)] border border-[var(--border-color)]
  rounded-[25px] flex flex-col gap-4 w-[300px]
  shadow-[0px_2px_15px_0px_rgba(0,0,0,0.1)]">

  <!-- Header -->
  <div class="flex flex-row items-center gap-3">
    <div class="rounded-full w-[50px] h-[50px] flex-shrink-0
      bg-[var(--primary-color)] flex items-center justify-center">
      <svg *ngIf="status === 'approved'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
      <svg *ngIf="status === 'rejected'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      <svg *ngIf="status === 'pending'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
    </div>

    <div class="flex flex-col flex-1 min-w-0">
      <h3 class="text-[18px] font-semibold text-[var(--primary-text-color)] leading-snug">
        Broken street lights
      </h3>
      <p class="text-[14px] text-[var(--primary-subtitle-color)]">1 week ago</p>
    </div>
  </div>

  <!-- Description -->
  <p class="text-[16px] font-medium text-[var(--primary-subtitle-color)] leading-snug line-clamp-3">
    The lights in my street are broken, and my 12 year old daughter needs them to go home late at night.
  </p>

  <!-- Badges -->
  <div class="flex flex-wrap gap-2">
    <div class="bg-[var(--background-color)] text-[var(--secondary-text-color)]
      rounded-[12px] px-3 py-[6px] text-[14px] font-medium w-fit">
      Very urgent
    </div>
    <div class="bg-[var(--background-color)] text-[var(--secondary-text-color)]
      rounded-[12px] px-3 py-[6px] text-[14px] font-medium w-fit">
      Street lights
    </div>
  </div>

  <!-- CTA -->
  <button
    class="flex flex-row items-center gap-2 justify-center
    py-2 px-4 rounded-[24px] bg-[var(--primary-color)] w-full border-none
    hover:bg-[#005E71] hover:cursor-pointer transition-colors duration-300">
    <span class="text-white text-[18px] font-medium">View Details</span>
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      class="text-white">
      <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
    </svg>
  </button>
</div>
