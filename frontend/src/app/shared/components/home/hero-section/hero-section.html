<section class="hero-section">

  <!-- Galleria Background Slider -->
  <div class="hero-slider">
    <p-galleria 
      [value]="images"
      [numVisible]="1"
      [circular]="true"
      [autoPlay]="true"
      [showItemNavigators]="true"
      [showThumbnails]="false"
      [responsiveOptions]="responsiveOptions"
      [containerStyle]="{ 'width': '100%', 'height': '100%' }"
    >
      <ng-template #item let-item>
        <div class="hero-image-wrapper">
          <img 
            [src]="item.itemImageSrc" 
            class="hero-image"
          />
          <!-- Dark overlay -->
          <div class="hero-overlay"></div>
        </div>
      </ng-template>
    </p-galleria>
  </div>

  <!-- Hero Content -->
  <div class="hero-content">
    <div class="hero-inner">
      <h2 class="hero-title line-clamp-3">
        Your City, Connected
        All Municipal Services 
        in One Place
      </h2>

      <p class="hero-description">
        Submit requests, track applications and stay informed about 
        your community anytime, anywhere.
      </p>

      <div class="hero-button-wrapper">
        <a href="#">
          <div
            class="block inset-0 group
            flex items-center gap-[2px]"
          >
            <!-- Circle -->
            <div class="p-[10px] bg-[var(--primary-color)] text-[var(--secondary-color)] 
              rounded-full flex items-center justify-center
              inline-block 
              group-hover:bg-[#005E71]
              group-hover:cursor-pointer">
                <svg 
                  xmlns="http://www.w3.org/2000/svg" 
                  width="24" height="24" viewBox="0 0 24 24" fill="none" 
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                  class="rotate-[-15deg] translate-y-[2px] lucide lucide-arrow-right-icon lucide-arrow-right">
                  <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                </svg>
            </div>

            <!-- Button -->
            <Button
              class="w-full bg-[var(--primary-color)] group-hover:bg-[#005E71]
              text-[var(--secondary-color)] text-[20px] 
              font-medium group-hover:cursor-pointer
              px-4 py-2 rounded-[25px]"
            >
              Browse Services
            </Button>
          </div>
        </a>
      </div>
    </div>
  </div>

</section>
