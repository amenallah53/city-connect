<div
  class="p-6 bg-white border border-[#E5E7EB] rounded-[30px] flex flex-col gap-4 h-full shadow-[0px_4px_20px_0px_rgba(0,0,0,0.05)]"
>
  <div class="flex justify-between items-start">
    <h3 class="text-[18px] font-semibold text-[var(--primary-text-color)] m-0 font-[family-name:var(--font-lato)]">
      {{ schedule.name }}
    </h3>
    <span class="text-[16px] text-[#8C8C8C] font-medium font-[family-name:var(--font-lato)]">
      {{ schedule.type }}
    </span>
  </div>

  <div class="flex items-center gap-2 mb-2">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="#8C8C8C"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="10" />
      <polyline points="12 6 12 12 16 14" />
    </svg>
    <span class="text-[16px] text-[#8C8C8C] font-medium font-[family-name:var(--font-lato)]">
      {{ schedule.heureDeb }} <span *ngIf="schedule.heureFin"> - {{ schedule.heureFin }}</span>
    </span>
  </div>

  <div class="flex flex-row gap-2 flex-wrap">
    @for (day of allDays; track day) {
    <div
      class="w-[36px] h-[36px] flex items-center justify-center rounded-full text-[13px] font-semibold transition-colors font-[family-name:var(--font-lato)]"
      [ngClass]="{
        'bg-[var(--primary-color)] text-white': isDayActive(day),
        'bg-[#EFEFEF] text-[#8C8C8C]': !isDayActive(day)
      }"
    >
      {{ shortDaysMap[day] || day }}
    </div>
    }
  </div>

  <div class="flex gap-2 mt-4">
    <button
      (click)="onEdit()"
      class="flex-1 h-[45px] rounded-[15px] border border-[var(--primary-color)] text-[var(--primary-color)] text-[16px] font-semibold flex items-center justify-center gap-2 hover:bg-[#F0F9FB] transition-colors font-[family-name:var(--font-lato)]"
    >
      Edit
    </button>
    <button
      (click)="onDelete()"
      class="flex-1 h-[45px] rounded-[15px] bg-[#FF4D4F] text-white text-[16px] font-semibold flex items-center justify-center gap-2 hover:bg-[#D9363E] transition-colors font-[family-name:var(--font-lato)]"
    >
      Delete
    </button>
  </div>
</div>
