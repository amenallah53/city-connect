<div class="mx-6 w-[97%] min-h-[100px] bg-white rounded-[25px] p-6 flex flex-row items-center justify-between flex-wrap gap-4">

    <!-- User info section -->
    <div class="flex flex-row items-center justify-start gap-6 flex-wrap">

        <!-- Avatar + Name -->
        <div class="flex flex-row items-center gap-4 font-[family-name:var(--font-lato)] text-lg font-medium text-[var(--primary-text-color)]">
            <div class="w-[60px] h-[60px] rounded-full overflow-hidden border border-[#bbbbbb] bg-white shrink-0">
                <img src="/assets/avatar.png" alt="avatar" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-row items-center justify-start gap-2">
                <span>Amenallah Kalai</span>
            </div>
        </div>

        <!-- Role -->
        <div class="flex flex-row items-center justify-start gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-user-icon lucide-user">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            <span class="font-[family-name:var(--font-lato)] text-lg font-medium text-[var(--primary-subtitle-color)]">Admin</span>
        </div>

        <!-- Email -->
        <div class="flex flex-row items-center justify-start gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-mail-icon lucide-mail">
                <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
                <rect x="2" y="4" width="20" height="16" rx="2" />
            </svg>
            <span class="font-[family-name:var(--font-lato)] text-lg font-medium text-[var(--primary-subtitle-color)]">amenallahkalai53@gmail.com</span>
        </div>

        <!-- Status -->
        <div class="flex flex-row items-center justify-start gap-2 text-[#00AF20] font-[family-name:var(--font-lato)] text-lg font-bold">
            Active
        </div>

    </div>

    <!-- Actions -->
    <div class="flex flex-row items-center justify-end gap-1">

        <!--view more-->
        <div class="w-12 h-12 flex items-center justify-center rounded-full cursor-pointer transition-all duration-300 text-[var(--primary-subtitle-color)] hover:bg-[#CCC] hover:text-[var(--primary-color)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-eye-icon lucide-eye">
                <path
                    d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                <circle cx="12" cy="12" r="3" />
            </svg>
        </div>

        <!--edit-->
        <div class="w-12 h-12 flex items-center justify-center rounded-full cursor-pointer transition-all duration-300 text-[var(--primary-subtitle-color)] hover:bg-[#CCC] hover:text-[var(--primary-color)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-pen-icon lucide-pen">
                <path
                    d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
            </svg>
        </div>

        <!--delete-->
        <div class="w-12 h-12 flex items-center justify-center rounded-full cursor-pointer transition-all duration-300 text-[var(--primary-subtitle-color)] hover:bg-[#CCC] hover:text-[var(--primary-color)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-trash2-icon lucide-trash-2">
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                <path d="M3 6h18" />
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
        </div>

    </div>

</div>
