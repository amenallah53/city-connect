<div class="bg-white rounded-[25px] p-6 shadow-[0px_2px_15px_0px_rgba(0,0,0,0.1)]
    flex flex-row items-center justify-between flex-wrap gap-4"
    [ngClass]="viewMode === 'grid' ? '!flex-col !items-start w-full' : ''">
    
    <!-- Info Section -->
    <div class="flex flex-row items-center justify-start gap-4 flex-wrap"
      [ngClass]="viewMode === 'grid' ? '!flex-col !items-start !gap-3 w-full' : ''">
      
        <!-- User icon + username -->
        <div class="flex flex-row items-center gap-2 min-w-[260px]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <div class="flex flex-col leading-tight">
                <span class="text-[16px] font-[family-name:var(--font-lato)] text-[var(--primary-subtitle-color)]">
                    {{ req.userName }}
                </span>
                <span class="text-[12px] text-[#6B7280] font-[family-name:var(--font-lato)]">
                    {{ req.email || 'No email' }} | {{ req.phone || 'No phone' }}
                </span>
            </div>
        </div>

        <!-- Service Name -->
        <div class="flex flex-row items-center justify-start gap-2 min-w-[250px]">
            <span class="text-[16px] font-semibold font-[family-name:var(--font-lato)] text-[var(--primary-text-color)]">
                {{ req.serviceName }}
            </span>
        </div>

        <!-- Date -->
        <div class="flex flex-row items-center justify-start gap-2 min-w-[120px]">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar">
                <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>
            </svg>
            <span class="font-[family-name:var(--font-lato)] text-[16px] font-medium text-[var(--primary-subtitle-color)]">
                {{ req.date }}
            </span>
        </div>

        <!-- Status -->
        <div class="flex flex-row items-center justify-start gap-2 font-[family-name:var(--font-lato)] text-[16px] font-semibold text-[var(--primary-subtitle-color)]">
            <ng-container *ngIf="req.backendStatus === 'pending'; else nonPendingStatus">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-dashed-icon lucide-circle-dashed">
                    <path d="M10.1 2.182a10 10 0 0 1 3.8 0"/><path d="M13.9 21.818a10 10 0 0 1-3.8 0"/><path d="M17.609 3.721a10 10 0 0 1 2.69 2.7"/><path d="M2.182 13.9a10 10 0 0 1 0-3.8"/><path d="M20.279 17.609a10 10 0 0 1-2.7 2.69"/><path d="M21.818 10.1a10 10 0 0 1 0 3.8"/><path d="M3.721 6.391a10 10 0 0 1 2.7-2.69"/><path d="M6.391 20.279a10 10 0 0 1-2.69-2.7"/>
                </svg>
                <span>pending</span>
            </ng-container>
            <ng-template #nonPendingStatus>
                <ng-container *ngIf="req.backendStatus === 'approved'; else rejectedStatus">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check-check text-[#2E7D32]">
                        <path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/>
                    </svg>
                    <span class="text-[#2E7D32]">approved</span>
                </ng-container>
                <ng-template #rejectedStatus>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-x text-[#C62828]">
                        <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>
                    </svg>
                    <span class="text-[#C62828]">rejected</span>
                </ng-template>
            </ng-template>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-row items-center justify-end gap-2"
        [ngClass]="viewMode === 'grid' ? '!w-full !justify-between mt-4 pt-4 border-t border-[#F0F0F0]' : ''">
        
        <!-- View -->
        <div (click)="viewRequest()" class="w-12 h-12 flex items-center justify-center rounded-full cursor-pointer transition-all duration-300 text-[var(--primary-subtitle-color)] hover:bg-[#CCC] hover:text-[var(--primary-color)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye">
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>
            </svg>
        </div>

        <div class="flex flex-row gap-2" *ngIf="req.backendStatus === 'pending'">
            <button (click)="approveRequest()" class="px-3 py-1.5 md:px-4 md:py-2 bg-[var(--primary-color)] hover:bg-[var(--secondary-color)] hover:text-[var(--primary-color)] text-[var(--secondary-color)] text-[14px] font-medium font-[family-name:var(--font-lato)] rounded-[12px] transition-colors shadow-[0px_2px_15px_0px_rgba(0,0,0,0.1)] border border-transparent hover:border-[var(--primary-color)]">
                Approve
            </button>
            <button (click)="rejectRequest()" class="px-3 py-1.5 md:px-4 md:py-2 bg-[#f44336] hover:bg-white hover:text-[#f44336] text-white text-[14px] font-medium font-[family-name:var(--font-lato)] rounded-[12px] transition-colors shadow-[0px_2px_15px_0px_rgba(0,0,0,0.1)] border border-transparent hover:border-[#f44336]">
                Reject
            </button>
        </div>
    </div>
</div>
