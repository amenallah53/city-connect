<div class="bg-white rounded-[25px] p-6 shadow-[0px_2px_15px_0px_rgba(0,0,0,0.1)]
    flex flex-row items-center justify-between flex-wrap gap-4">

    <!-- User icon + username -->
    <div class="flex flex-row items-center gap-3 w-full md:w-[200px]">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
        </svg>
        <span class="text-[16px] font-[family-name:var(--font-lato)] text-[var(--primary-subtitle-color)]">
            {{ $any(complaint).author_name || 'Anonymous' }}
        </span>
    </div>

    <!-- Complaint text -->
    <div
        class="flex-1 min-w-[250px] text-[16px] font-semibold font-[family-name:var(--font-lato)] text-[var(--primary-text-color)]">
        {{ complaint.description }}
    </div>

    <!-- Status -->
    <div
        class="flex flex-row items-center gap-2 min-w-[100px] text-[16px] font-[family-name:var(--font-lato)] text-[var(--primary-subtitle-color)]">

        <ng-container *ngIf="complaint.status === 'pending'; else readStatus">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-circle-dashed-icon lucide-circle-dashed">
                <path d="M10.1 2.182a10 10 0 0 1 3.8 0" />
                <path d="M13.9 21.818a10 10 0 0 1-3.8 0" />
                <path d="M17.609 3.721a10 10 0 0 1 2.69 2.7" />
                <path d="M2.182 13.9a10 10 0 0 1 0-3.8" />
                <path d="M20.279 17.609a10 10 0 0 1-2.7 2.69" />
                <path d="M21.818 10.1a10 10 0 0 1 0 3.8" />
                <path d="M3.721 6.391a10 10 0 0 1 2.7-2.69" />
                <path d="M6.391 20.279a10 10 0 0 1-2.69-2.7" />
            </svg>
            <span>unread</span>
        </ng-container>

        <ng-template #readStatus>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-check-check">
                <path d="M18 6 7 17l-5-5" />
                <path d="m22 10-7.5 7.5L13 16" />
            </svg>
            <span>read</span>
        </ng-template>

    </div>

    <!-- Actions -->
    <div class="flex flex-row items-center justify-end gap-1">
        <!--view more-->
        <div (click)="viewComplaint()"
            class="w-12 h-12 flex items-center justify-center rounded-full cursor-pointer transition-all duration-300 text-[var(--primary-subtitle-color)] hover:bg-[#CCC] hover:text-[var(--primary-color)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-eye">
                <path
                    d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                <circle cx="12" cy="12" r="3" />
            </svg>
        </div>

        <!--reply-->
        <div (click)="replyComplaint()"
            class="w-12 h-12 flex items-center justify-center rounded-full cursor-pointer transition-all duration-300 text-[var(--primary-subtitle-color)] hover:bg-[#CCC] hover:text-[var(--primary-color)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-message-square-reply">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                <path d="m10 7-3 3 3 3" />
                <path d="M7 10h7a2 2 0 0 1 2 2v1" />
            </svg>
        </div>

        <!--delete-->
        <div (click)="deleteComplaint()"
            class="w-12 h-12 flex items-center justify-center rounded-full cursor-pointer transition-all duration-300 text-[var(--primary-subtitle-color)] hover:bg-[#CCC] hover:text-[var(--primary-color)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-trash-2">
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                <path d="M3 6h18" />
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
        </div>
    </div>

</div>
