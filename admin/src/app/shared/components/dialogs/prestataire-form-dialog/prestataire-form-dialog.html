<div class="flex flex-col gap-6 font-[family-name:var(--font-lato)] p-2">
    <!-- Header -->
    <div class="flex flex-row justify-between items-start">
        <div class="flex flex-col gap-1">
            <h2 class="text-[32px] font-bold text-[var(--primary-text-color)] m-0 leading-tight">
                {{ isEditMode ? 'Edit prestataire' : 'Add a new prestataire' }}
            </h2>
            <p class="text-[16px] italic text-[var(--secondary-text-color)] m-0">
                {{ isEditMode ? 'update the details below.' : 'fill in the details below to create a new user.' }}
            </p>
        </div>
        <button (click)="save()"
                class="border border-[var(--primary-color)] text-[14px] font-medium
                       py-2 px-6 rounded-[12px] shadow-[0px_2px_15px_0px_rgba(0,0,0,0.1)]
                       bg-[var(--primary-color)] text-[var(--secondary-color)]
                       hover:bg-[#005E71] hover:cursor-pointer transition-colors duration-300">
            Save prestataire
        </button>
    </div>

    <!-- Form Outline -->
    <div class="flex flex-col gap-5 mt-2">
        <h3 class="text-[20px] font-medium text-[var(--primary-text-color)] m-0 ml-6">Prestataire main Information</h3>

        <div class="flex flex-col gap-4 ml-6">
            <!-- First Name -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">First Name</label>
                <input type="text" [(ngModel)]="formData.firstName" placeholder="Add First Name"
                       class="w-full h-[40px] px-3 bg-white border border-[var(--border-color)] rounded-[8px] text-[var(--primary-text-color)] font-[family-name:var(--font-lato)] outline-none focus:border-[var(--primary-color)] transition-colors">
            </div>

            <!-- Last Name -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">Last Name</label>
                <input type="text" [(ngModel)]="formData.lastName" placeholder="Add Last Name"
                       class="w-full h-[40px] px-3 bg-white border border-[var(--border-color)] rounded-[8px] text-[var(--primary-text-color)] font-[family-name:var(--font-lato)] outline-none focus:border-[var(--primary-color)] transition-colors">
            </div>

            <!-- Email -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">Email</label>
                <input type="email" [(ngModel)]="formData.email" placeholder="Add Email Address"
                       class="w-full h-[40px] px-3 bg-white border border-[var(--border-color)] rounded-[8px] text-[var(--primary-text-color)] font-[family-name:var(--font-lato)] outline-none focus:border-[var(--primary-color)] transition-colors">
            </div>

            <!-- CIN -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">CIN</label>
                <input type="text" [(ngModel)]="formData.cin" placeholder="Add CIN Number"
                       class="w-full h-[40px] px-3 bg-white border border-[var(--border-color)] rounded-[8px] text-[var(--primary-text-color)] font-[family-name:var(--font-lato)] outline-none focus:border-[var(--primary-color)] transition-colors">
            </div>

            <!-- Phone Number -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">Phone Number</label>
                <input type="text" [(ngModel)]="formData.telephone" placeholder="Add Phone Number"
                       class="w-full h-[40px] px-3 bg-white border border-[var(--border-color)] rounded-[8px] text-[var(--primary-text-color)] font-[family-name:var(--font-lato)] outline-none focus:border-[var(--primary-color)] transition-colors">
            </div>

            <!-- Address -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">Address</label>
                <input type="text" [(ngModel)]="formData.addresse" placeholder="Add Address"
                       class="w-full h-[40px] px-3 bg-white border border-[var(--border-color)] rounded-[8px] text-[var(--primary-text-color)] font-[family-name:var(--font-lato)] outline-none focus:border-[var(--primary-color)] transition-colors">
            </div>

            <!-- Specialty -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">Specialty</label>
                <input type="text" [(ngModel)]="formData.specialty" placeholder="Add the category of the service"
                       class="w-full h-[40px] px-3 bg-white border border-[var(--border-color)] rounded-[8px] text-[var(--primary-text-color)] font-[family-name:var(--font-lato)] outline-none focus:border-[var(--primary-color)] transition-colors">
            </div>

            <!-- Description -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">Description</label>
                <textarea [(ngModel)]="formData.description" placeholder="Add short description about the prestataire" rows="4"
                          class="w-full px-3 py-2 bg-white border border-[var(--border-color)] rounded-[8px] text-[var(--primary-text-color)] font-[family-name:var(--font-lato)] outline-none focus:border-[var(--primary-color)] transition-colors resize-none"></textarea>
            </div>

            <!-- Extra Document -->
            <div class="flex flex-col gap-1">
                <label class="text-[14px] text-[var(--primary-text-color)] font-medium">Extra Document (optional)</label>
                <div class="flex items-center gap-4">
                    <div class="w-[80px] h-[80px] bg-[#E0E5E9] rounded-[8px] flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9EAAAE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-image">
                            <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
                            <circle cx="9" cy="9" r="2"/>
                            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
                        </svg>
                    </div>
                    <div class="flex flex-col gap-2 w-full">
                        <span class="text-[14px] italic text-[var(--secondary-text-color)]">Please upload a document where you can strengthen your request</span>
                        <div class="flex items-center bg-[#FAFAFA] border border-[var(--border-color)] rounded-[8px] overflow-hidden w-full h-[40px]">
                            <button class="bg-white border-r border-[var(--border-color)] px-4 h-full text-[14px] text-[var(--primary-color)] font-medium hover:bg-gray-50 flex items-center justify-center">
                                Choose File
                            </button>
                            <span class="px-4 text-[14px] text-[var(--secondary-text-color)]">No File Chosen</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
