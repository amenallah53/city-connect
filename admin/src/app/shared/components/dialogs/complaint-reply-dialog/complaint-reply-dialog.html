<div class="flex flex-col gap-6 font-[family-name:var(--font-lato)] p-2 bg-[#FFFFFF]">
    <!-- Header -->
    <div class="flex flex-col gap-1">
        <h2 class="text-[32px] font-bold text-[var(--primary-text-color)] m-0 leading-tight">Complaint Reply</h2>
        <p class="text-[16px] italic text-[#6B7280] m-0">these are the details of the complaint</p>
    </div>

    <!-- Content -->
    <div class="flex flex-col gap-4 mt-2">
        <h3 class="text-[20px] font-medium text-[var(--primary-text-color)] m-0">Complaint Reply section</h3>

        <div class="flex flex-col gap-2">
            <span class="text-[15px] italic text-[#4B5563]">Reply here</span>
            <textarea
                [(ngModel)]="replyText"
                class="w-full h-[120px] p-4 text-[15px] text-[#4B5563] border border-[#E5E7EB] rounded-[8px] bg-[#FFFFFF] resize-none outline-none focus:border-[#00899B]"
                placeholder="Type your reply..."></textarea>
        </div>

        <div>
            <button (click)="submitReply()"
                class="border-none flex items-center justify-center font-[family-name:var(--font-lato)]
                       h-[40px] px-6 rounded-[8px] bg-[#00899B] text-[#FFFFFF] text-[15px] font-medium
                       hover:bg-[#007A8A] hover:cursor-pointer transition-colors duration-300">
                Reply
            </button>
        </div>
    </div>
</div>
