<div class="flex flex-col gap-6 font-[family-name:var(--font-lato)] p-2 bg-[#FFFFFF]">
    <div class="flex flex-row justify-between items-start">
        <div class="flex flex-col gap-1">
            <h2 class="text-[32px] font-bold text-[var(--primary-text-color)] m-0 leading-tight">
                {{ isEditMode() ? 'Answer FAQ' : 'Add a new FAQ' }}
            </h2>
            <p class="text-[16px] italic text-[#6B7280] m-0">
                {{ isEditMode() ? 'Provide an answer for this question.' : 'Fill in your question below.' }}
            </p>
        </div>

        <button (click)="saveForm()" [disabled]="loading()"
            class="border-none flex items-center justify-center font-[family-name:var(--font-lato)]
                   h-[40px] px-6 rounded-[12px] bg-[#00899B] text-[#FFFFFF] text-[15px] font-medium
                   hover:bg-[#007A8A] hover:cursor-pointer transition-colors duration-300
                   disabled:opacity-50 disabled:cursor-not-allowed">
            {{ loading() ? 'Saving...' : 'Save' }}
        </button>
    </div>

    @if (error()) {
        <p class="text-red-500 text-[14px] m-0">{{ error() }}</p>
    }

    <div class="flex flex-col gap-5 bg-[#FFFFFF]">
        <div class="flex flex-col gap-1">
            <span class="text-[15px] text-[#1E293B]">Question</span>
            <input type="text"
                   [value]="faq().question ?? ''"
                   (input)="setQuestion($any($event.target).value)"
                   [readOnly]="isEditMode()"
                   placeholder="Type your question here..."
                   class="w-full h-[48px] px-4 text-[15px] text-[#4B5563] border border-[#E5E7EB] rounded-[8px] bg-[#FFFFFF] outline-none focus:border-[#00899B]"
                   [class.bg-gray-50]="isEditMode()"
                   [class.cursor-not-allowed]="isEditMode()">
        </div>

        @if (isEditMode()) {
            <div class="flex flex-col gap-1">
                <span class="text-[15px] text-[#1E293B]">Answer</span>
                <input type="text"
                       [value]="faq().answer ?? ''"
                       (input)="setAnswer($any($event.target).value)"
                       placeholder="Type your answer here..."
                       class="w-full h-[48px] px-4 text-[15px] text-[#4B5563] border border-[#E5E7EB] rounded-[8px] bg-[#FFFFFF] outline-none focus:border-[#00899B]">
            </div>
        }
    </div>
</div>
