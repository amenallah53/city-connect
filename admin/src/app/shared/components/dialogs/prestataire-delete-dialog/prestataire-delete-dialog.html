<div class="flex flex-col gap-6 font-[family-name:var(--font-lato)] p-2">
    <!-- Header -->
    <div class="flex flex-col gap-1">
        <h2 class="text-[24px] font-bold text-[var(--primary-text-color)] m-0 leading-tight">Delete prestataire</h2>
        <p class="text-[16px] italic text-[var(--secondary-text-color)] m-0">Are you sure you want to delete this prestataire?</p>
    </div>

    <!-- Content -->
    <div class="flex flex-col gap-4 border border-[#F0F0F0] rounded-[8px] p-4 bg-[#FAFAFA]">
        <div class="flex items-center gap-3">
            <div class="w-[40px] h-[40px] rounded-full overflow-hidden border border-[#F0F0F0] bg-white shrink-0">
                <img src="/assets/avatar.png" alt="avatar" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col">
                <span class="text-[16px] font-semibold text-[var(--primary-text-color)]">{{ prestataire.firstName }} {{ prestataire.lastName }}</span>
                <span class="text-[14px] text-[var(--primary-subtitle-color)]">{{ prestataire.email }}</span>
            </div>
        </div>
        <p class="text-[14px] text-[#E53935] m-0 font-medium">This action cannot be undone.</p>
    </div>

    <!-- Actions -->
    <div class="flex flex-row gap-3 justify-end mt-2">
        <button (click)="cancel()"
                class="border border-[var(--border-color)] text-[14px] font-medium
                       py-2 px-6 rounded-[12px] bg-white text-[var(--secondary-text-color)]
                       hover:bg-[#F0F0F0] hover:cursor-pointer transition-colors duration-300">
            Cancel
        </button>
        <button (click)="confirm()"
                class="border border-[#E53935] text-[14px] font-medium
                       py-2 px-6 rounded-[12px] shadow-[0px_2px_15px_0px_rgba(229,57,53,0.2)]
                       bg-[#E53935] text-white hover:bg-[#C62828]
                       hover:cursor-pointer transition-colors duration-300">
            Delete prestataire
        </button>
    </div>
</div>
