<div class="flex flex-col gap-6 font-[family-name:var(--font-lato)] p-2 bg-[#FFFFFF]">
    <!-- Header -->
    <div class="flex flex-col gap-1">
        <h2 class="text-[32px] font-bold text-[var(--primary-text-color)] m-0 leading-tight">FAQ main information</h2>
        <p class="text-[16px] italic text-[#6B7280] m-0">Here are ...</p>
    </div>

    <!-- Content -->
    <div class="flex flex-col gap-5 mt-2">
        <h3 class="text-[20px] font-medium text-[var(--primary-text-color)] m-0">FAQ Information</h3>

        <div class="flex flex-col gap-6 bg-[#FFFFFF]">
            <div class="flex flex-col gap-1">
                <span class="text-[15px] italic text-[#4B5563]">Question Title</span>
                <span class="text-[16px] text-[#4B5563]">{{ faq.question }}</span>
            </div>

            <div class="flex flex-col gap-1" *ngIf="faq.answer">
                <span class="text-[15px] italic text-[#4B5563]">Answer</span>
                <span class="text-[16px] text-[#4B5563] whitespace-pre-wrap leading-relaxed">{{ faq.answer }}</span>
            </div>

        </div>
    </div>
</div>
