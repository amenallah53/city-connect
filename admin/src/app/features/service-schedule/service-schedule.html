<section class="flex flex-col h-full overflow-y-auto">
  <!-- Header + Filter row -->
  <div class="px-6 pt-6 pb-2 flex flex-col gap-1">
    <h1 class="font-rubik text-[32px] font-medium text-[var(--primary-text-color)] m-0">
      Services Schedules management
    </h1>
    <div class="flex flex-col gap-4 mt-1">
      <p class="text-[17px] text-[var(--secondary-text-color)] italic font-[family-name:var(--font-lato)] m-0 opacity-80">
        Here where we lie to our dear citizens
      </p>

      <div class="flex flex-row items-center justify-between flex-wrap gap-4 mt-2">
        <div class="flex flex-row gap-3 items-center flex-wrap">
          <!-- Search input -->
          <div class="card flex justify-center rounded-[18px] shadow-[0px_2px_15px_0px_rgba(0,0,0,0.08)]">
            <div class="relative flex items-center bg-white rounded-[18px] overflow-hidden w-[320px]">
              <input
                type="text"
                placeholder="Search for ..."
                [(ngModel)]="searchQuery"
                (keydown)="onSearchKeydown($event)"
                class="w-full h-[46px] border-none bg-transparent pl-5 pr-10 font-[family-name:var(--font-lato)] text-[15px] text-[var(--secondary-text-color)] outline-none placeholder:text-[#8C8C8C]"
              />
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#8C8C8C"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="absolute right-4 pointer-events-none"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </div>
          </div>

          <!-- Filter by role/type -->
          <div class="card flex justify-center rounded-[18px] shadow-[0px_2px_15px_0px_rgba(0,0,0,0.08)] bg-white h-[46px]">
            <p-select
              dataKey="code"
              [options]="roleFilters"
              [(ngModel)]="selectedRoleFilter"
              optionLabel="name"
              placeholder="Filter by role"
              class="w-full md:w-[160px] text-[#8C8C8C] bg-transparent border-0 shadow-none focus:ring-0"
              (onChange)="onFilterChange()"
            />
          </div>
        </div>

        <!-- Add Button -->
        <button
          (click)="callAddScheduleDialog()"
          class="h-[46px] px-8 rounded-[12px] bg-[var(--primary-color)] text-white text-[16px] font-semibold shadow-[0px_4px_15px_0px_rgba(0,0,0,0.1)] hover:bg-[#005E71] transition-all font-[family-name:var(--font-lato)]"
        >
          Add a schedule
        </button>
      </div>
    </div>
  </div>

  <!-- Schedules Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-6 py-8">
    @for (schedule of pagedSchedules; track schedule.id) {
    <app-service-schedule-card [schedule]="schedule"></app-service-schedule-card>
    }
  </div>

  <!-- Empty state -->
  <div
    *ngIf="filteredSchedules.length === 0"
    class="flex flex-col items-center justify-center py-20 gap-4 text-[var(--primary-subtitle-color)]"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="64"
      height="64"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="text-[var(--secondary-text-color)]"
    >
      <circle cx="12" cy="12" r="10" />
      <line x1="12" y1="8" x2="12" y2="12" />
      <line x1="12" y1="16" x2="12.01" y2="16" />
    </svg>
    <p class="text-[18px] text-[var(--primary-subtitle-color)] font-medium">
      No service schedules found.
    </p>
  </div>

  <!-- Paginator -->
  <div class="flex justify-center py-8 pb-16" *ngIf="filteredSchedules.length > 0">
    <p-paginator
      (onPageChange)="onPageChange($event)"
      [first]="first"
      [rows]="rows"
      [totalRecords]="filteredSchedules.length"
      [showCurrentPageReport]="false"
      [showPageLinks]="true"
      [showJumpToPageDropdown]="false"
    />
  </div>
</section>
