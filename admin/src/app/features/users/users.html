<div class="flex flex-col p-[10px] gap-6">

    <!-- Titles -->
    <div class="flex flex-col px-6">
        <p class="title">User accounts management</p>
        <p class="subtitle">Review citizen accounts.</p>
    </div>

    <!-- Search & Filters -->
    <div class="flex justify-between items-center px-6 flex-wrap gap-4">
        <div class="flex gap-4 items-center flex-wrap">

            <!-- Search input -->
            <div class="relative flex items-center bg-white border border-[var(--border-color)] rounded-full h-12 overflow-hidden w-[320px] max-w-full">
                <input type="text" placeholder="Search for ..."
                    class="w-full h-full border-none bg-transparent pl-5 pr-12 font-[family-name:var(--font-lato)] text-lg text-[var(--secondary-text-color)] outline-none placeholder:text-[var(--secondary-text-color)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-search absolute right-5 text-[var(--secondary-text-color)] pointer-events-none">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
            </div>

            <!-- Filter by role -->
            <div class="relative flex items-center bg-white border border-[var(--border-color)] rounded-full h-12 overflow-hidden w-[200px] max-w-full">
                <select
                    class="w-full h-full border-none bg-transparent pl-5 pr-12 font-[family-name:var(--font-lato)] text-lg text-[var(--secondary-text-color)] outline-none appearance-none cursor-pointer">
                    <option value="" disabled selected hidden>Filter by role</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                </select>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-chevron-down absolute right-5 text-[var(--secondary-text-color)] pointer-events-none">
                    <path d="m6 9 6 6 6-6" />
                </svg>
            </div>

        </div>

        <button
            class="bg-[var(--primary-color)] border border-[var(--primary-color)] text-white rounded-xl px-[18px] py-3 font-[family-name:var(--font-lato)] text-lg font-normal cursor-pointer transition-all duration-200 hover:bg-white hover:text-[var(--primary-color)]">
            Add user
        </button>
    </div>

    <!-- Users list — max 6 cards for easy navigation -->
    <div class="flex flex-col gap-4">
        <app-user-card></app-user-card>
        <app-user-card></app-user-card>
        <app-user-card></app-user-card>
        <app-user-card></app-user-card>
        <app-user-card></app-user-card>
        <app-user-card></app-user-card>
    </div>

    <!-- Paginator -->
    <div class="flex justify-center">
        <div class="flex justify-center">
            <p-paginator (onPageChange)="onPageChange($event)" [first]="first" [rows]="rows" [totalRecords]="120"
                [rowsPerPageOptions]="[10, 20, 30]" />
        </div>
    </div>

</div>
