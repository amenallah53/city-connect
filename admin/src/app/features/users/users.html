<div class="users-page vertical-div">
    <div class="vertical-div titles">
        <p class="title">User accounts management</p>
        <p class="subtitle">Review citizen accounts.</p>
    </div>
    <div class="search-filters">
        <div class="search-filters-left">
            <div class="search-input-wrapper">
                <input type="text" placeholder="Search for ..." class="search-input">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-search search-icon">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
            </div>

            <div class="filter-wrapper">
                <select class="filter-select">
                    <option value="" disabled selected hidden>Filter by role</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                </select>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-chevron-down filter-icon">
                    <path d="m6 9 6 6 6-6" />
                </svg>
            </div>
        </div>

        <button class="add-user-btn">Add user</button>
    </div>
    <div class="users-list vertical-div">
        <app-user-card></app-user-card>
        <app-user-card></app-user-card>
        <app-user-card></app-user-card>
        <app-user-card></app-user-card>

    </div>
</div>
