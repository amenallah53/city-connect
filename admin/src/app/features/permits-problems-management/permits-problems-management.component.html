<div class="permits-container">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <svg class="phone-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M3 9l6-7h8l4 9-6 7h-8l-4-9z" stroke="white" stroke-width="2"/>
      </svg>
      <span class="header-text">48 278 788 | 97 276 134</span>
    </div>
    <div class="header-right">
      <svg class="bell-icon" width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/>
      </svg>
      <div class="user-profile">
        <div class="profile-avatar">
          <span class="profile-initial">AK</span>
        </div>
        <div class="dropdown-indicator"></div>
      </div>
    </div>
  </header>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-left">
      <div class="logo">
        <span>C</span>
      </div>
      <span class="brand-name">CityConnect</span>
    </div>
    <div class="navbar-tabs">
      <a href="#" class="nav-tab active">Home</a>
      <a href="#" class="nav-tab">Jobs</a>
      <a href="#" class="nav-tab">Services</a>
      <a href="#" class="nav-tab">FAQ</a>
      <a href="#" class="nav-tab">Report</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Page Title -->
    <div class="page-header">
      <h1>Permits and problems management</h1>
    </div>

    <!-- Filters Section -->
    <div class="filters-section">
      <div class="search-box">
        <input
          type="text"
          placeholder="Search for ..."
          [(ngModel)]="searchQuery"
          class="search-input"
        />
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="m10 10 4 4" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>

      <select [(ngModel)]="selectedType" class="filter-select">
        <option [value]="type" *ngFor="let type of typeOptions">{{ type }}</option>
      </select>

      <select [(ngModel)]="selectedStatus" class="filter-select">
        <option [value]="status" *ngFor="let status of statusOptions">{{ status }}</option>
      </select>
    </div>

    <!-- Requests List -->
    <div class="requests-container">
      <div *ngIf="paginatedRequests.length === 0" class="empty-state">
        <p>No requests found</p>
      </div>

      <div *ngFor="let request of paginatedRequests; let i = index" class="request-card" [class.inactive]="i > 0" (click)="openDetails(request)">
        <div class="request-header">
          <h3>{{ request.title }}</h3>
          <span class="timestamp">{{ request.timestamp }}</span>
        </div>

        <p class="request-email">{{ request.email }}</p>

        <div class="request-meta">
          <span class="request-type">{{ request.type }}</span>
          <div class="status-badge" [style.backgroundColor]="request.statusColor">
            <span class="status-dot">●</span>
            <span class="status-text" [style.color]="request.statusTextColor">{{ request.status }}</span>
          </div>
        </div>

        <div class="request-actions" (click)="$event.stopPropagation()">
          <button class="btn-approve" (click)="onApprove(request)">Approve</button>
          <button class="btn-reject" (click)="onReject(request)">Reject</button>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div *ngIf="totalPages > 1" class="pagination">
      <button
        *ngFor="let page of pageNumbers"
        [class]="'page-btn ' + (page === currentPage() ? 'active' : '')"
        [disabled]="page === '...'"
        (click)="goToPage(page)"
      >
        {{ page }}
      </button>
    </div>

    <!-- Details Modal -->
    <app-details-modal 
      [isOpen]="isModalOpen()"
      [request]="selectedRequest()"
      (onClose)="closeModal()"
      (onApprove)="onDetailApprove($event)"
      (onReject)="onDetailReject($event)"
      (onSendNote)="onDetailSendNote($event)">
    </app-details-modal>
  </div>
</div>
