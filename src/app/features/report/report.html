<div class="vertical-div titles">
    <p class="title">My Report Tickets</p>
    <p class="subtitle">Check your tickets and follow their progress here!</p>
</div>

<div class="report-cards-container vertical-div">
    <app-report-card status="pending"></app-report-card>
    <app-report-card status="approved"></app-report-card>
    <app-report-card status="rejected"></app-report-card>
    <app-report-card status="ongoing"></app-report-card>
</div>

<div class="horizontal-div page-selector">
    <div class="current-page-number">
        <p>1</p>
    </div>
    <div class="page-number">
        <p>2</p>
    </div>

    <div class="page-number">
        <p>3</p>
    </div>

    <div class="three-dots">
        <p>...</p>
    </div>
    
    <div class="page-number">
        <p>5</p>
    </div>
    
    <div class="page-number">
        <p>6</p>
    </div>
</div>
