<section class="px-[64px] py-6 flex justify-center items-center relative">
  <!-- Clock image outside the rounded div, positioned relative to section -->
  <img 
    src="/assets/clock.png" alt="clock" 
    class="absolute top-[-10px] right-[40px] h-[450px] w-auto z-10 pointer-events-none">

  <div 
      class="relative w-full h-[400px] rounded-[25px] p-8 
             bg-[var(--primary-color)] text-[var(--secondary-color)] 
             flex flex-col justify-center items-start gap-6">

      <!-- Background image overlay -->
      <div class="absolute inset-0 bg-[url('/assets/texture.jpg')] bg-cover bg-center opacity-20 z-0 rounded-[25px]"></div>
      
      <!-- Content above overlay -->
      <div class="relative z-10 flex flex-col gap-4 max-w-[600px]">
        <h2 class="font-rubik text-[40px] font-semibold line-clamp-2">
            Service Hours & Schedules
        </h2>
        
        <p class="font-regular text-[20px] line-clamp-3">
            View the operating hours of all main municipal services, 
            including administrative offices, waste collection schedules, 
            and public service departments.
        </p>
      </div>
      
      <a href="#" class="relative z-10">
        <div class="flex items-center gap-[8px] group">
          <div class="p-[10px] bg-[var(--secondary-color)] text-[var(--primary-color)] 
                      rounded-full flex items-center justify-center
                      group-hover:bg-[var(--background-color)]
                      group-hover:cursor-pointer">
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" height="24" viewBox="0 0 24 24" fill="none" 
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                class="rotate-[-15deg] translate-y-[2px]">
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>
          </div>
          <button
              class="w-full bg-[var(--secondary-color)] text-[var(--primary-color)] text-[20px] 
                     font-medium group-hover:cursor-pointer group-hover:bg-[var(--background-color)]
                     px-4 py-2 rounded-[25px]">
            View Full Schedule
          </button>
        </div>
      </a>
      
  </div>
</section>
